<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }
        .player { display: flex; flex-direction: column; align-items: center; padding: 60px 20px 40px; border-bottom: 1px solid #1a1a1a; }
        .cd-wrap { position: relative; width: 280px; height: 280px; margin-bottom: 32px; }
        .cd-slot {
            width: 280px; height: 280px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a2a, #111);
            border: 2px solid #222; display: flex; align-items: center;
            justify-content: center; position: relative; overflow: hidden;
        }
        .cd-slot.spinning { animation: spin 4s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .cd-cover { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
        .cd-cover.visible { display: block; }
        .cd-placeholder { font-size: 80px; opacity: 0.2; }
        .cd-hole { position: absolute; width: 44px; height: 44px; background: #0a0a0a; border-radius: 50%; border: 2px solid #1a1a1a; z-index: 2; pointer-events: none; }
        .cd-shine { position: absolute; inset: 0; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%); z-index: 1; pointer-events: none; }
        .cd-info { text-align: center; margin-bottom: 32px; min-height: 60px; }
        .cd-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .cd-info p { color: #888; font-size: 14px; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 24px; border-radius: 100px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: #fff; color: #000; }
        .btn-green { background: #1db954; color: #fff; }
        .btn-eject { background: #1a1a1a; color: #888; border: 1px solid #222; }
        .cd-select { background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 100px; padding: 12px 20px; font-size: 14px; cursor: pointer; outline: none; }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .mode-tab { padding: 8px 20px; border-radius: 100px; border: 1px solid #333; background: none; color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .mode-tab.active { background: #fff; color: #000; border-color: #fff; }
        .content { max-width: 680px; margin: 0 auto; padding: 40px 20px; }
        .tracklist h3 { font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
        .track { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
        .track:hover { background: #141414; }
        .track.active { background: #141414; }
        .track-num { color: #444; font-size: 13px; width: 24px; text-align: right; flex-shrink: 0; }
        .track-playing { display: none; width: 24px; justify-content: flex-end; align-items: center; gap: 2px; flex-shrink: 0; }
        .track.active .track-num { display: none; }
        .track.active .track-playing { display: flex; }
        .bar { width: 3px; border-radius: 2px; background: #fff; animation: eq 0.8s ease-in-out infinite alternate; }
        .bar:nth-child(1) { height: 8px; animation-delay: 0s; }
        .bar:nth-child(2) { height: 14px; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 6px; animation-delay: 0.4s; }
        @keyframes eq { to { height: 4px; } }
        .track-title { flex: 1; font-size: 14px; }
        .track.active .track-title { color: #fff; font-weight: 500; }
        .track-duration { color: #444; font-size: 12px; }
        .lyrics { padding-top: 32px; margin-top: 32px; border-top: 1px solid #1a1a1a; display: none; }
        .lyrics.open { display: block; }
        .lyrics h3 { font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
        .lyrics-text { font-size: 16px; line-height: 2.4; color: #777; white-space: pre-line; }
        #status { text-align: center; color: #444; padding: 40px; font-size: 14px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    <div class="player">
        <div class="cd-wrap">
            <div class="cd-slot" id="cdSlot">
                <div class="cd-placeholder" id="cdPlaceholder">💿</div>
                <img class="cd-cover" id="cdCover" src="" alt="">
                <div class="cd-shine"></div>
                <div class="cd-hole"></div>
            </div>
        </div>
        <div class="cd-info">
            <h2 id="cdTitle">CD를 삽입해주세요</h2>
            <p id="cdArtist">— — —</p>
        </div>

        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('real')">💿 실제 CD</button>
            <button class="mode-tab" onclick="switchMode('demo')">🎵 데모</button>
        </div>

        <div class="controls">
            <div class="panel active" id="realPanel">
                <button class="btn btn-green" onclick="readRealCD()">⏏ CD 읽기</button>
                <button class="btn btn-eject" onclick="ejectCD()">꺼내기</button>
            </div>
            <div class="panel" id="demoPanel" style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                <select class="cd-select" id="cdSelect"><option value="">CD 선택...</option></select>
                <button class="btn btn-primary" onclick="insertDemo()">▶ 삽입</button>
                <button class="btn btn-eject" onclick="ejectCD()">꺼내기</button>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="status">CD를 드라이브에 넣고 "CD 읽기"를 눌러보세요</div>
        <div class="tracklist" id="tracklist" style="display:none">
            <h3>Track List</h3>
            <div id="trackItems"></div>
        </div>
        <div class="lyrics" id="lyricsPanel">
            <h3 id="lyricsTitle">Lyrics</h3>
            <div class="lyrics-text" id="lyricsText"></div>
        </div>
    </div>

    <script>
        let currentArtist = '';
        let currentMode = 'real';

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && mode === 'real') || (i === 1 && mode === 'demo'));
            });
            document.getElementById('realPanel').classList.toggle('active', mode === 'real');
            document.getElementById('demoPanel').style.display = mode === 'demo' ? 'flex' : 'none';
            ejectCD();
        }

        async function readRealCD() {
            resetUI();
            document.getElementById('cdSlot').classList.add('spinning');
            document.getElementById('cdPlaceholder').style.display = 'none';
            document.getElementById('status').innerHTML = '<span class="spinner"></span>CD 읽는 중...';

            const data = await (await fetch('/api/read-cd')).json();
            document.getElementById('cdSlot').classList.remove('spinning');

            if (data.error) {
                document.getElementById('status').textContent = data.error;
                document.getElementById('cdPlaceholder').style.display = 'block';
                return;
            }

            currentArtist = data.artist;
            document.getElementById('cdTitle').textContent = data.title;
            document.getElementById('cdArtist').textContent = `${data.artist} · ${data.year}`;

            const cover = document.getElementById('cdCover');
            cover.src = data.cover;
            cover.onload = () => { cover.classList.add('visible'); document.getElementById('cdPlaceholder').style.display = 'none'; };
            cover.onerror = () => { cover.classList.remove('visible'); document.getElementById('cdPlaceholder').style.display = 'block'; };

            document.getElementById('status').textContent = '';
            renderTracks(data.tracks);
        }

        async function init() {
            const cds = await (await fetch('/api/fake-cds')).json();
            const select = document.getElementById('cdSelect');
            cds.forEach((cd, i) => {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = cd.label;
                select.appendChild(opt);
            });
            window._cds = cds;
        }

        async function insertDemo() {
            const idx = document.getElementById('cdSelect').value;
            if (idx === '') return;
            const cd = window._cds[idx];
            resetUI();
            document.getElementById('cdSlot').classList.add('spinning');
            document.getElementById('cdPlaceholder').style.display = 'none';
            document.getElementById('status').innerHTML = '<span class="spinner"></span>CD 읽는 중...';

            const artist = await (await fetch(`/api/search/${encodeURIComponent(cd.artist)}`)).json();
            if (artist.error) { document.getElementById('status').textContent = '인식 실패'; return; }
            currentArtist = artist.name;

            const albums = await (await fetch(`/api/albums/${artist.id}`)).json();
            if (!albums.length) { document.getElementById('status').textContent = '앨범 없음'; return; }

            const album = albums[0];
            document.getElementById('cdSlot').classList.remove('spinning');
            document.getElementById('cdTitle').textContent = album.title;
            document.getElementById('cdArtist').textContent = `${artist.name} · ${album.year}`;

            const cover = document.getElementById('cdCover');
            cover.src = album.cover;
            cover.onload = () => cover.classList.add('visible');
            cover.onerror = () => { cover.classList.remove('visible'); document.getElementById('cdPlaceholder').style.display = 'block'; };

            document.getElementById('status').textContent = '';
            const tracks = await (await fetch(`/api/tracks/${album.id}`)).json();
            renderTracks(tracks);
        }

        function renderTracks(tracks) {
            const items = document.getElementById('trackItems');
            items.innerHTML = '';
            tracks.forEach(t => {
                const row = document.createElement('div');
                row.className = 'track';
                row.innerHTML = `
                    <span class="track-num">${t.number}</span>
                    <span class="track-playing"><span class="bar"></span><span class="bar"></span><span class="bar"></span></span>
                    <span class="track-title">${t.title}</span>
                    <span class="track-duration">${t.duration}</span>
                `;
                row.onclick = () => loadLyrics(t.title, row);
                items.appendChild(row);
            });
            document.getElementById('tracklist').style.display = 'block';
        }

        async function loadLyrics(trackTitle, row) {
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            row.classList.add('active');
            document.getElementById('lyricsPanel').classList.add('open');
            document.getElementById('lyricsTitle').textContent = trackTitle;
            document.getElementById('lyricsText').innerHTML = '<span class="spinner"></span>가사 불러오는 중...';
            const data = await (await fetch(`/api/lyrics/${encodeURIComponent(currentArtist)}/${encodeURIComponent(trackTitle)}`)).json();
            document.getElementById('lyricsText').textContent = data.plain || '가사를 찾을 수 없어요';
        }

        function resetUI() {
            document.getElementById('cdCover').classList.remove('visible');
            document.getElementById('cdPlaceholder').style.display = 'block';
            document.getElementById('tracklist').style.display = 'none';
            document.getElementById('lyricsPanel').classList.remove('open');
            document.getElementById('cdTitle').textContent = '읽는 중...';
            document.getElementById('cdArtist').textContent = '— — —';
        }

        function ejectCD() {
            document.getElementById('cdSlot').classList.remove('spinning');
            document.getElementById('cdCover').classList.remove('visible');
            document.getElementById('cdPlaceholder').style.display = 'block';
            document.getElementById('cdTitle').textContent = 'CD를 삽입해주세요';
            document.getElementById('cdArtist').textContent = '— — —';
            document.getElementById('tracklist').style.display = 'none';
            document.getElementById('lyricsPanel').classList.remove('open');
            document.getElementById('status').textContent = currentMode === 'real' ? 'CD를 드라이브에 넣고 "CD 읽기"를 눌러보세요' : '위에서 CD를 선택하고 삽입해보세요';
            if (document.getElementById('cdSelect')) document.getElementById('cdSelect').value = '';
        }

        init();
    </script>
</body>
</html>

<script>
// CD 자동 감지 — 3초마다 상태 확인
let lastDiscId = null;
setInterval(async () => {
    try {
        const state = await (await fetch('/api/cd-status')).json();
        if (state.disc_id && state.disc_id !== lastDiscId) {
            lastDiscId = state.disc_id;
            if (document.getElementById('realPanel').classList.contains('active') || currentMode === 'real') {
                readRealCD();
            }
        }
        if (!state.disc_id && lastDiscId) {
            lastDiscId = null;
            ejectCD();
        }
    } catch(e) {}
}, 3000);
</script>
