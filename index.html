<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD Player App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; padding: 40px 20px; }
        h1 { text-align: center; font-size: 24px; margin-bottom: 32px; color: #ccc; letter-spacing: 2px; }
        .search-bar { display: flex; gap: 10px; max-width: 500px; margin: 0 auto 40px; }
        .search-bar input { flex: 1; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; }
        .search-bar button { padding: 12px 24px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
        .artist-info { text-align: center; margin-bottom: 32px; }
        .artist-info h2 { font-size: 32px; }
        .artist-info p { color: #888; margin-top: 4px; }
        .albums-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .album-card { background: #1a1a1a; border-radius: 12px; padding: 16px; border: 1px solid #222; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
        .album-card:hover { border-color: #555; transform: translateY(-4px); }
        .album-cover { width: 100%; aspect-ratio: 1; background: #2a2a2a; border-radius: 8px; margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .album-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .album-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .album-year { font-size: 12px; color: #888; }
        #status { text-align: center; color: #888; margin-top: 40px; }
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
        .modal-bg.open { display: flex; }
        .modal { background: #1a1a1a; border-radius: 16px; width: 90%; max-width: 560px; padding: 24px; border: 1px solid #333; }
        .modal-header { display: flex; gap: 16px; margin-bottom: 24px; align-items: center; }
        .modal-cover { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #2a2a2a; }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-year { color: #888; font-size: 14px; margin-top: 4px; }
        .close-btn { margin-left: auto; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        .track { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
        .track:hover { background: #2a2a2a; }
        .track.active { background: #2a2a2a; }
        .track-num { color: #555; font-size: 14px; width: 24px; text-align: right; flex-shrink: 0; }
        .track-title { flex: 1; font-size: 14px; }
        .track-duration { color: #888; font-size: 12px; }
        .lyrics-panel { margin-top: 24px; padding-top: 24px; border-top: 1px solid #222; display: none; }
        .lyrics-panel.open { display: block; }
        .lyrics-track-title { font-size: 14px; color: #888; margin-bottom: 16px; }
        .lyrics-text { font-size: 15px; line-height: 2; color: #ccc; white-space: pre-line; }
        .loading { text-align: center; color: #888; padding: 24px 0; }
    </style>
</head>
<body>
    <h1>🎵 CD PLAYER</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="아티스트 이름 입력..." value="billie eilish">
        <button onclick="search()">검색</button>
    </div>
    <div class="artist-info" id="artistInfo"></div>
    <div class="albums-grid" id="albumsGrid"></div>
    <div id="status">아티스트를 검색해보세요</div>

    <div class="modal-bg" id="modalBg" onclick="closeModal(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <img class="modal-cover" id="modalCover" src="" alt="">
                <div>
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-year" id="modalYear"></div>
                </div>
                <button class="close-btn" onclick="closeModalDirect()">✕</button>
            </div>
            <div id="trackList"><div class="loading">트랙 불러오는 중...</div></div>
            <div class="lyrics-panel" id="lyricsPanel">
                <div class="lyrics-track-title" id="lyricsTrackTitle"></div>
                <div class="lyrics-text" id="lyricsText"></div>
            </div>
        </div>
    </div>

    <script>
        let currentArtist = '';

        async function search() {
            const query = document.getElementById('searchInput').value;
            document.getElementById('status').textContent = '검색 중...';
            document.getElementById('albumsGrid').innerHTML = '';
            document.getElementById('artistInfo').innerHTML = '';

            const artistRes = await fetch(`/api/search/${query}`);
            const artist = await artistRes.json();
            if (artist.error) { document.getElementById('status').textContent = '아티스트를 찾을 수 없어요'; return; }

            currentArtist = artist.name;
            document.getElementById('artistInfo').innerHTML = `<h2>${artist.name}</h2><p>${artist.country}</p>`;
            document.getElementById('status').textContent = '앨범 불러오는 중...';

            const albumsRes = await fetch(`/api/albums/${artist.id}`);
            const albums = await albumsRes.json();
            document.getElementById('status').textContent = '';
            const grid = document.getElementById('albumsGrid');
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <div class="album-cover"><img src="${album.cover}" alt="${album.title}" onerror="this.parentElement.innerHTML='💿'"></div>
                    <div class="album-title">${album.title}</div>
                    <div class="album-year">${album.year}</div>
                `;
                card.onclick = () => openModal(album);
                grid.appendChild(card);
            });
        }

        async function openModal(album) {
            document.getElementById('modalTitle').textContent = album.title;
            document.getElementById('modalYear').textContent = album.year;
            document.getElementById('modalCover').src = album.cover;
            document.getElementById('trackList').innerHTML = '<div class="loading">트랙 불러오는 중...</div>';
            document.getElementById('lyricsPanel').classList.remove('open');
            document.getElementById('modalBg').classList.add('open');

            const res = await fetch(`/api/tracks/${album.id}`);
            const tracks = await res.json();
            const list = document.getElementById('trackList');
            if (!tracks.length) { list.innerHTML = '<div class="loading">트랙 정보 없음</div>'; return; }

            list.innerHTML = '';
            tracks.forEach(t => {
                const row = document.createElement('div');
                row.className = 'track';
                row.innerHTML = `
                    <span class="track-num">${t.number}</span>
                    <span class="track-title">${t.title}</span>
                    <span class="track-duration">${t.duration}</span>
                `;
                row.onclick = () => loadLyrics(t.title, row);
                list.appendChild(row);
            });
        }

        async function loadLyrics(trackTitle, row) {
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            row.classList.add('active');
            const panel = document.getElementById('lyricsPanel');
            panel.classList.add('open');
            document.getElementById('lyricsTrackTitle').textContent = trackTitle;
            document.getElementById('lyricsText').textContent = '가사 불러오는 중...';

            const res = await fetch(`/api/lyrics/${encodeURIComponent(currentArtist)}/${encodeURIComponent(trackTitle)}`);
            const data = await res.json();
            document.getElementById('lyricsText').textContent = data.plain || '가사를 찾을 수 없어요';
        }

        function closeModal(e) { if (e.target === document.getElementById('modalBg')) closeModalDirect(); }
        function closeModalDirect() { document.getElementById('modalBg').classList.remove('open'); }

        search();
    </script>
</body>
</html>
