<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD Player App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 32px;
            color: #ccc;
            letter-spacing: 2px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 40px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .search-bar button {
            padding: 12px 24px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        .artist-info {
            text-align: center;
            margin-bottom: 32px;
        }
        .artist-info h2 { font-size: 32px; }
        .artist-info p { color: #888; margin-top: 4px; }
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .album-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #222;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
        }
        .album-card:hover {
            border-color: #555;
            transform: translateY(-4px);
        }
        .album-cover {
            width: 100%;
            aspect-ratio: 1;
            background: #2a2a2a;
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
        .album-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .album-year { font-size: 12px; color: #888; }
        #status { text-align: center; color: #888; margin-top: 40px; }
    </style>
</head>
<body>
    <h1>🎵 CD PLAYER</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="아티스트 이름 입력..." value="billie eilish">
        <button onclick="search()">검색</button>
    </div>
    <div class="artist-info" id="artistInfo"></div>
    <div class="albums-grid" id="albumsGrid"></div>
    <div id="status">아티스트를 검색해보세요</div>

    <script>
        async function search() {
            const query = document.getElementById('searchInput').value;
            document.getElementById('status').textContent = '검색 중...';
            document.getElementById('albumsGrid').innerHTML = '';
            document.getElementById('artistInfo').innerHTML = '';

            const artistRes = await fetch(`/api/search/${query}`);
            const artist = await artistRes.json();

            if (artist.error) {
                document.getElementById('status').textContent = '아티스트를 찾을 수 없어요';
                return;
            }

            document.getElementById('artistInfo').innerHTML = `
                <h2>${artist.name}</h2>
                <p>${artist.country}</p>
            `;
            document.getElementById('status').textContent = '앨범 불러오는 중...';

            const albumsRes = await fetch(`/api/albums/${artist.id}`);
            const albums = await albumsRes.json();

            document.getElementById('status').textContent = '';
            const grid = document.getElementById('albumsGrid');
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <div class="album-cover">
                        <img src="${album.cover}" alt="${album.title}"
                             onerror="this.parentElement.innerHTML='💿'">
                    </div>
                    <div class="album-title">${album.title}</div>
                    <div class="album-year">${album.year}</div>
                `;
                grid.appendChild(card);
            });
        }

        search();
    </script>
</body>
</html>
