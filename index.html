<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }

        /* 상단 CD 플레이어 영역 */
        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
            border-bottom: 1px solid #1a1a1a;
        }
        .cd-slot {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #111;
            border: 2px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 32px;
            transition: all 0.5s ease;
        }
        .cd-slot.spinning {
            animation: spin 3s linear infinite;
            border-color: #444;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .cd-cover {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            object-fit: cover;
            display: none;
        }
        .cd-cover.visible { display: block; }
        .cd-placeholder {
            font-size: 80px;
            opacity: 0.2;
        }
        .cd-hole {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #0a0a0a;
            border-radius: 50%;
            border: 2px solid #222;
        }

        .cd-info { text-align: center; margin-bottom: 32px; min-height: 60px; }
        .cd-info h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .cd-info p { color: #888; font-size: 14px; }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 24px;
            border-radius: 100px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: #fff; color: #000; }
        .btn-ghost { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-eject { background: #1a1a1a; color: #888; border: 1px solid #222; }

        /* CD 선택 드롭다운 */
        .cd-select {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 100px;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        /* 하단 트랙/가사 영역 */
        .content { max-width: 680px; margin: 0 auto; padding: 40px 20px; }

        .tracklist { margin-bottom: 32px; }
        .tracklist h3 { font-size: 12px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
        .track {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 8px; border-radius: 8px; cursor: pointer;
            transition: background 0.15s;
        }
        .track:hover { background: #1a1a1a; }
        .track.active { background: #1a1a1a; }
        .track.active .track-num { display: none; }
        .track.active .track-playing { display: block !important; }
        .track-num { color: #555; font-size: 13px; width: 24px; text-align: right; flex-shrink: 0; }
        .track-playing { display: none; color: #fff; font-size: 13px; width: 24px; text-align: right; flex-shrink: 0; }
        .track-title { flex: 1; font-size: 14px; }
        .track-duration { color: #555; font-size: 12px; }

        .lyrics { padding-top: 32px; border-top: 1px solid #1a1a1a; display: none; }
        .lyrics.open { display: block; }
        .lyrics h3 { font-size: 12px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
        .lyrics-text { font-size: 16px; line-height: 2.2; color: #aaa; white-space: pre-line; }

        #status { text-align: center; color: #555; padding: 40px; font-size: 14px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="player">
        <div class="cd-slot" id="cdSlot">
            <div class="cd-placeholder" id="cdPlaceholder">💿</div>
            <img class="cd-cover" id="cdCover" src="" alt="">
            <div class="cd-hole"></div>
        </div>

        <div class="cd-info" id="cdInfo">
            <h2 id="cdTitle">CD를 삽입해주세요</h2>
            <p id="cdArtist">— — —</p>
        </div>

        <div class="controls">
            <select class="cd-select" id="cdSelect">
                <option value="">CD 선택...</option>
            </select>
            <button class="btn btn-primary" onclick="insertCD()">▶ 삽입</button>
            <button class="btn btn-eject" onclick="ejectCD()">⏏ 꺼내기</button>
        </div>
    </div>

    <div class="content">
        <div id="status">위에서 CD를 선택하고 삽입해보세요</div>
        <div class="tracklist" id="tracklist" style="display:none">
            <h3>Track List</h3>
            <div id="trackItems"></div>
        </div>
        <div class="lyrics" id="lyricsPanel">
            <h3 id="lyricsTitle">Lyrics</h3>
            <div class="lyrics-text" id="lyricsText"></div>
        </div>
    </div>

    <script>
        let currentArtist = '';
        let currentAlbum = null;

        async function init() {
            const res = await fetch('/api/fake-cds');
            const cds = await res.json();
            const select = document.getElementById('cdSelect');
            cds.forEach((cd, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = cd.label;
                select.appendChild(opt);
            });
            window._cds = cds;
        }

        async function insertCD() {
            const select = document.getElementById('cdSelect');
            const idx = select.value;
            if (idx === '') return;
            const cd = window._cds[idx];

            document.getElementById('cdTitle').textContent = '읽는 중...';
            document.getElementById('cdArtist').textContent = '— — —';
            document.getElementById('cdSlot').classList.add('spinning');
            document.getElementById('cdPlaceholder').style.display = 'none';
            document.getElementById('cdCover').classList.remove('visible');
            document.getElementById('tracklist').style.display = 'none';
            document.getElementById('lyricsPanel').classList.remove('open');
            document.getElementById('status').innerHTML = '<span class="spinner"></span>CD 읽는 중...';

            const artistRes = await fetch(`/api/search/${encodeURIComponent(cd.artist)}`);
            const artist = await artistRes.json();
            if (artist.error) {
                document.getElementById('status').textContent = '인식할 수 없는 CD예요';
                document.getElementById('cdSlot').classList.remove('spinning');
                return;
            }
            currentArtist = artist.name;

            const albumsRes = await fetch(`/api/albums/${artist.id}`);
            const albums = await albumsRes.json();
            if (!albums.length) {
                document.getElementById('status').textContent = '앨범 정보를 찾을 수 없어요';
                return;
            }

            currentAlbum = albums[0];
            document.getElementById('cdSlot').classList.remove('spinning');
            document.getElementById('cdTitle').textContent = currentAlbum.title;
            document.getElementById('cdArtist').textContent = `${artist.name} · ${currentAlbum.year}`;

            const cover = document.getElementById('cdCover');
            cover.src = currentAlbum.cover;
            cover.classList.add('visible');
            cover.onerror = () => {
                cover.classList.remove('visible');
                document.getElementById('cdPlaceholder').style.display = 'block';
            };

            document.getElementById('status').textContent = '';
            loadTracks(currentAlbum.id);
        }

        async function loadTracks(albumId) {
            const res = await fetch(`/api/tracks/${albumId}`);
            const tracks = await res.json();
            const items = document.getElementById('trackItems');
            items.innerHTML = '';
            tracks.forEach(t => {
                const row = document.createElement('div');
                row.className = 'track';
                row.innerHTML = `
                    <span class="track-num">${t.number}</span>
                    <span class="track-playing">♪</span>
                    <span class="track-title">${t.title}</span>
                    <span class="track-duration">${t.duration}</span>
                `;
                row.onclick = () => loadLyrics(t.title, row);
                items.appendChild(row);
            });
            document.getElementById('tracklist').style.display = 'block';
        }

        async function loadLyrics(trackTitle, row) {
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            row.classList.add('active');
            const panel = document.getElementById('lyricsPanel');
            panel.classList.add('open');
            document.getElementById('lyricsTitle').textContent = trackTitle;
            document.getElementById('lyricsText').innerHTML = '<span class="spinner"></span>가사 불러오는 중...';

            const res = await fetch(`/api/lyrics/${encodeURIComponent(currentArtist)}/${encodeURIComponent(trackTitle)}`);
            const data = await res.json();
            document.getElementById('lyricsText').textContent = data.plain || '가사를 찾을 수 없어요';
        }

        function ejectCD() {
            document.getElementById('cdSlot').classList.remove('spinning');
            document.getElementById('cdCover').classList.remove('visible');
            document.getElementById('cdPlaceholder').style.display = 'block';
            document.getElementById('cdTitle').textContent = 'CD를 삽입해주세요';
            document.getElementById('cdArtist').textContent = '— — —';
            document.getElementById('tracklist').style.display = 'none';
            document.getElementById('lyricsPanel').classList.remove('open');
            document.getElementById('status').textContent = '위에서 CD를 선택하고 삽입해보세요';
            document.getElementById('cdSelect').value = '';
        }

        init();
    </script>
</body>
</html>
